    {skill_md}
    
    **PREVIOUS SKILL RESULTS (CONTEXT FROM PREVIOUS STEPS):**
    {previous_results}
    
    **CURRENT SKILL EXECUTION HISTORY (TOOL CALLS IN THIS STEP):**
    {local_history}
    
    **YOUR TASK:**
    Determine the next step to execute this skill.
    
    **AVAILABLE TOOLS:**
    1. `run_shell_command(command)`: Execute bash commands. All commands run with CWD = "{workspace_root}".
    2. `write_file(path, content)`: Create new files relative to "{workspace_root}".
    3. `patch_file(path, search, replace)`: Edit existing files relative to "{workspace_root}".
    4. `read_file(path)`: Read files relative to "{workspace_root}".
    5. `list_directory(path)`: List files relative to "{workspace_root}".
    
    **CRITICAL RULES:**
    1. **DO NOT \`cd\`**: Your tools automatically run in the WORKSPACE ROOT ("{workspace_root}"). Do NOT use \`cd\` in your commands.
    2. **USE SKILL RESOURCES**: To use bundled scripts or templates, reference them by their absolute path: "{skill_root}/<file>".
    3. **OUTPUT LOCATION**: All output files (documents, code, logs) MUST be created in the WORKSPACE ROOT ("{workspace_root}") or its subdirectories.
    4. **WORKSPACE FIRST**: If the user asks for actions in the "current working directory", they mean the WORKSPACE ROOT.
    5. **SUMMARY**: When the task is complete, provide a summary of the files created/modified in the WORKSPACE ROOT.
    
    **RESPOND WITH JSON:**
