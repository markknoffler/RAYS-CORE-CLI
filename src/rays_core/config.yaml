    **USER PROMPT:**
    "{user_prompt}"
    
    **OVERALL PLAN:**
    {overall_plan}
    
    **CURRENT SKILL:**
    {skill_name}
    
    **WORKSPACE ROOT (USER'S CURRENT DIRECTORY):**
    "{workspace_root}"
    
    **SKILL ROOT (ABSOLUTE PATH TO RESOURCES):**
