symbol_detection_prompts:
  explicit_mentions_extraction: "Analyze this user prompt and extract ALL explicit\
    \ mentions of files, symbols, lines, and creation requests.\n\nUser Prompt: \"\
    {user_prompt}\"\n\nExtract with MAXIMUM detail:\n\n1. **Explicit Line Edits**:\
    \ User mentions specific line numbers in files\n   - Examples: \"change line 45\
