    end-of-run summary for this RAYS execution.


    USER PROMPT (RAW):

    {user_prompt}


    COMBINED AUGMENTED PROMPT (WITH MEMORY + LAST 2 TASKS):

    {augmented_prompt}


    EXECUTION DATA (CODE CHANGES + COMMANDS + RESULTS):

    {execution_data}


    MEMORY SUMMARY OBJECTS (STRUCTURED):

    {memory_summary}


    GIT STATUS SUMMARY:

    {git_status_summary}


    REQUIREMENTS:

    1) Explain what changed in code, grouped logically.

    2) Include terminal commands and outcomes (build/test/run/fix steps).

    3) Explain why these changes were made relative to user intent.

    4) Mention important risks, follow-ups, or verification notes.

    5) Be complete but concise; plain text only (no markdown code fences).

    6) Output should be directly printable in a terminal summary box.

    7) DO NOT output JSON, YAML, XML, dicts, arrays, or key-value blobs.

    8) DO NOT include braces as a structured object format. Write narrative prose
    and bullet points only.

    9) Start immediately with the summary content (no preface like "Here is the summary").

    '
final_symbol_selection_prompts:
  analyze_and_select_symbols: "You are a code analysis expert. Your task is to identify\
    \ which symbols will ACTUALLY be affected by the user's request.\n\n**USER REQUEST:**\n\
    \"{user_prompt}\"\n\n**TASK SUMMARY:**\n- Task Type: {task_type}\n- Scope Definition\
    \ (SDS): {sds_score}/1.0\n- Creative Freedom (IES): {ies_score}/1.0\n- Keywords:\
    \ {keywords}\n\n**EXPLICIT MENTIONS (if any):**\n{explicit_mentions_summary}\n\
    \n**CANDIDATE SYMBOLS ({num_symbols} total):**\nBelow are code symbols that might\
    \ be related. Your job is to determine which ones are ACTUALLY affected.\n\n{symbols_with_code}\n\
    \n**YOUR TASK:**\nAnalyze each symbol's code and determine:\n1. Will this symbol\
    \ need to be MODIFIED to fulfill the user's request?\n2. Will this symbol need\
    \ to be READ/REFERENCED to understand dependencies?\n3. Is this symbol completely\
    \ unrelated?\n\n**CRITICAL RULE:**\nAny symbol or file EXPLICITLY mentioned in\
    \ the user prompt (see EXPLICIT MENTIONS section) MUST be included in the `affected_symbols`\
    \ list, even if it seems redundant or trivial. You MUST NOT filter out these symbols.\n\
    \nConsider:\n- Direct mentions in user prompt\n- Functional dependencies (what\
    \ calls what)\n- Data flow (what data passes through)\n- User intent (what are\
    \ they trying to achieve)\n\n**RESPOND WITH JSON:**\n{{\n  \"affected_symbols\"\
