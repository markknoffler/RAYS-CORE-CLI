anchoring_prompts:
  file_placement: "You are a code organization expert. Determine where to create a\
    \ new file in a codebase.\n\n**NEW FILE TO CREATE:**\n- Filename: {file_name}\n\
    - Purpose: {purpose}\n- Structure: {structure}\n- Symbols it will contain:\n{symbols_info}\n\
    \n**IMPLEMENTATION CONTEXT:**\n{plan_summary}\n\n**CODEBASE DIRECTORY STRUCTURE:**\n\
    {directory_tree}\n\n**EXISTING FILES (with contents):**\n{file_list}\n\n**SEMANTICALLY\
    \ RELATED FILES:**\n{related_files}\n\n**YOUR TASK:**\nAnalyze the codebase structure\
    \ and determine the BEST directory to place this new file.\n\n**RULES:**\n1. Follow\
    \ existing project conventions (e.g., if auth code is in src/auth/, new auth files\
    \ go there)\n2. Group related functionality together\n3. Don't create new directories\
    \ unless absolutely necessary\n4. Consider where similar files already exist\n\
    5. Return a RELATIVE path from the codebase root\n\n**RESPOND WITH JSON:**\n{{\n\
    \  \"target_directory\": \"<relative path to directory, e.g., 'src/auth/' or 'alphafold/model/'>\"\
    ,\n  \"full_path\": \"<complete relative path including filename, e.g., 'src/auth/jwt_middleware.py'>\"\
    ,\n  \"related_files\": [\"<list of similar files in that directory>\"],\n  \"\
    confidence\": <0.0-1.0>,\n  \"reasoning\": \"<why this directory is the best fit>\"\
    \n}}\n\nIMPORTANT: \n- Use forward slashes (/) for paths\n- Directory paths should\
    \ end with /\n- Return paths relative to codebase root\n"
  symbol_insertion: "You are a code placement expert. Determine where to insert a\
    \ new symbol into a file.\n\n**NEW SYMBOL TO INSERT:**\n- Name: {symbol_name}\n\
    - Type: {symbol_type}\n- Signature: {signature}\n- Purpose: {purpose}\n\n**IMPLEMENTATION\
    \ CONTEXT:**\n{plan_summary}\n\n**TARGET FILE SKELETON:**\n{file_skeleton}\n\n\
    **YOUR TASK:**\nAnalyze the file structure and determine the BEST line number\
    \ to insert this new symbol.\n\n**RULES:**\n1. Classes should be inserted after\
    \ imports, typically after existing classes\n2. Functions should be grouped with\
    \ related functions\n3. Methods should be inserted at the end of their parent\
    \ class\n4. Constants should be at the top after imports\n5. Maintain logical\
    \ grouping (auth functions together, helper functions together, etc.)\n\n**RESPOND\
    \ WITH JSON:**\n{{\n  \"line\": <exact line number to insert AT>,\n  \"type\"\
    : \"<top_level|inside_class|after_imports>\",\n  \"parent_class\": \"<class name\
    \ if inserting inside a class, else null>\",\n  \"context\": \"<brief description\
    \ of insertion location>\",\n  \"confidence\": <0.0-1.0>,\n  \"reasoning\": \"\
    <why this location is best>\"\n}}\n\nIMPORTANT: The line number should be where\
    \ the NEW code will START.\nFor example, if inserting after line 45, return line\
    \ 46.\n"
available_models:
- qwen3-coder:30b
- qwen3:8b
- qwen3:30b
- gemma3:27b
blocking_symbol_detection_prompts:
  analyze_blocker_resolution: "You are a blocking resolution planner. Your task is\
    \ to determine HOW to modify the blocking symbol so implementation can proceed.\n\
    \n**ORIGINAL IMPLEMENTATION PLAN:**\n{implementation_plan_summary}\n\n**PLANNED\
    \ CHANGES (what we WANT to do):**\n{planned_changes}\n\n**AFFECTED SYMBOL CODE\
    \ (the symbol being edited):**\n{affected_symbols_code}\n\n**BLOCKING SYMBOL CODE:**\n\
    {blocking_symbol_code}\n\n**BLOCKING RELATIONSHIP:**\n{blocking_relationship}\n\
    \n**YOUR TASK:**\nDetermine what changes are needed to the BLOCKING SYMBOL to\
    \ unblock the planned implementation.\n\n**CONTEXT:**\n- The affected symbol needs\
    \ to change according to the plan\n- The blocking symbol prevents those changes\
    \ from working\n- You must modify the BLOCKING symbol (not the affected one)\n\
    - Changes must be MINIMAL and maintain existing functionality\n\n**ANALYSIS STEPS:**\n\
    1. Read the planned changes to the affected symbol\n2. Read the blocking symbol's\
    \ code\n3. Identify EXACTLY what in the blocker prevents the planned change\n\
    4. Determine MINIMAL changes to blocker that unblock without breaking it\n\n**EXAMPLES:**\n\
    - **If** plan changes `login(username)` \u2192 `login(username, token)` \n  **And**\
    \ blocker calls `login(user)` with 1 param\n  **Then** modify blocker to call\
    \ `login(user, None)` or `login(user, generate_token())`\n\n- **If** plan removes\
    \ `user.locked` field\n  **And** blocker checks `if user.locked:`\n  **Then**\
    \ modify blocker to `if getattr(user, 'locked', False):`\n\n- **If** plan changes\
    \ return type from dict \u2192 object\n  **And** blocker accesses `result['key']`\n\
    \  **Then** modify blocker to `result.key` or add adapter\n\n**RESPOND WITH JSON:**\n\
    {{\n  \"resolution_strategy\": \"<modify|extend|refactor|bypass|adapt>\",\n  \"\
    required_changes\": [\n    {{\n      \"location\": \"<exact line number or section\
    \ in BLOCKING symbol>\",\n      \"change_type\": \"<add|modify|remove|wrap>\"\
    ,\n      \"current\": \"<exact current code from blocker>\",\n      \"new\": \"\
    <exact new code for blocker>\",\n      \"reason\": \"<why this change unblocks\
    \ the implementation>\"\n    }}\n  ],\n  \"estimated_complexity\": \"<trivial|moderate|significant>\"\
    ,\n  \"risk_assessment\": \"<low|medium|high>\",\n  \"potential_side_effects\"\
    : [\n    \"<what else might break from changing the blocker>\"\n  ],\n  \"introduces_new_blockers\"\
    : <true|false>,\n  \"new_blocker_candidates\": [\n    {{\n      \"symbol_name\"\
    : \"<symbol that might now block THIS change>\",\n      \"reason\": \"<why it\
    \ might block>\"\n    }}\n  ],\n  \"rationale\": \"<2-3 sentence explanation of\
    \ resolution approach>\"\n}}\n\nFocus on MINIMAL, SURGICAL changes to the blocking\
    \ symbol only.\nDo NOT suggest changes to the affected symbol - that's already\
    \ planned.\n"
  predict_blocking_symbols: "You are a dependency analysis expert. Your task is to\
    \ identify symbols that may BLOCK the planned implementation.\n\n**IMPLEMENTATION\
    \ PLAN:**\n{implementation_plan_summary}\n\n**PLANNED EDITS:**\n{planned_edits}\n\
    \n**AFFECTED SYMBOLS (with code & dependencies):**\n{affected_symbols_code}\n\n\
    **DEFINITION OF BLOCKING SYMBOL:**\nA symbol S blocks a planned change P if one\
    \ or more of:\n1. **Semantic Conflict**: S enforces logic contradicting new behavior\
    \ (validation, invariants, assumptions)\n2. **Structural Constraint**: S controls\
    \ lifecycle, ownership, or call ordering (factory, registry, dispatcher)\n3. **Interface\
    \ Limitation**: S's API cannot support P without change (missing param, wrong\
    \ return type, sealed enum)\n4. **Control Choke-point**: S has high fan-in or\
    \ gating logic (auth checks, routing tables, switch statements)\n\n\u26A0\uFE0F\
    \ NOT blocking: merely \"related\" or \"nearby\" code\n\u26A0\uFE0F IS blocking:\
    \ code that MUST change or adapt for P to work\n\n**YOUR TASK:**\nAnalyze the\
    \ implementation plan, current code, and dependencies. Predict which symbols might\
    \ block implementation.\n\n**HOW TO FIND FILE PATHS:**\n- Look at the dependency\
    \ graph (Symbol A \u2192 Symbol B means A calls B)\n- Check imports/function calls\
    \ in the code\n- Infer from symbol naming conventions (e.g., \"UserValidator\"\
    \ likely in validation/ or models/)\n- If unsure, use your best judgment based\
    \ on project structure patterns\n- You can leave file_path as \"unknown\" if truly\
    \ uncertain - we'll search by symbol name\n\n**RESPOND WITH JSON:**\n{{\n  \"\
    predicted_blocking_symbols\": [\n    {{\n      \"symbol_name\": \"<exact symbol\
    \ name from dependencies or code>\",\n      \"blocking_reason\": \"<why this blocks\
    \ implementation>\",\n      \"blocking_type\": \"<semantic_conflict|structural_constraint|interface_limitation|control_chokepoint>\"\
    ,\n      \"blocks_which_edits\": [\"<which planned edits are blocked>\"],\n  \
    \    \"confidence\": \"<high|medium|low>\",\n      \"evidence\": \"<what in the\
    \ code/dependencies suggests this is blocking>\"\n    }}\n  ],\n  \"analysis\"\
    : \"<2-3 sentence summary of blocking landscape>\"\n}}\n\nBe conservative - only\
    \ predict symbols with CONCRETE blocking mechanisms.\nFocus on symbols you see\
    \ in the dependency graph or referenced in code.\nIf no blocking symbols exist,\
    \ return empty array.\n"
  validate_blocking_symbols: "You are a blocking symbol validator. Your task is to\
    \ CONFIRM which predicted blockers are ACTUALLY blocking.\n\n**IMPLEMENTATION\
    \ PLAN:**\n{implementation_plan_summary}\n\n**PLANNED EDITS:**\n{planned_edits}\n\
    \n**AFFECTED SYMBOLS (code that WILL BE CHANGED):**\n{affected_symbols_code}\n\
    \n**PREDICTED BLOCKING SYMBOLS (with reasons):**\n{predicted_blockers}\n\n**ACTUAL\
    \ CODE OF PREDICTED BLOCKERS:**\n{blocking_symbols_code}\n\n**YOUR TASK:**\nCompare\
    \ the AFFECTED symbols with the BLOCKING symbols. Determine which blockers are\
    \ TRULY blocking.\n\n**VALIDATION CRITERIA:**\nFor each predicted blocker, ask:\n\
    1. Does this symbol's implementation ACTUALLY conflict with the planned changes?\n\
    2. Looking at BOTH codes, will the planned edit break this blocker?\n3. Will this\
    \ blocker prevent the planned edit from working?\n4. Is there a concrete mechanism\
    \ (not just proximity) that creates blocking?\n\n**EXAMPLES OF TRUE BLOCKING:**\n\
    - Affected symbol calls blocker's method with 2 params, but plan changes it to\
    \ 3 params \u2192 blocker's signature blocks\n- Blocker validates a field that\
    \ plan will remove \u2192 validation logic blocks\n- Blocker assumes a certain\
    \ call order that plan will break \u2192 lifecycle blocks\n\n**EXAMPLES OF FALSE\
    \ BLOCKING:**\n- Blocker is in same file but unrelated \u2192 NOT blocking\n-\
    \ Blocker uses affected symbol but won't break from planned changes \u2192 NOT\
    \ blocking\n- Blocker is similar in purpose but no direct dependency \u2192 NOT\
    \ blocking\n\n**RESPOND WITH JSON:**\n{{\n  \"confirmed_blocking_symbols\": [\n\
    \    {{\n      \"symbol_name\": \"<exact symbol name>\",\n      \"file_path\"\
    : \"<use the ACTUAL file path from blocking symbols code above>\",\n      \"chunk_id\"\
    : \"<leave blank, will be filled>\",\n      \"blocking_reason\": \"<precise reason\
    \ with CODE EVIDENCE from both symbols>\",\n      \"blocking_type\": \"<semantic_conflict|structural_constraint|interface_limitation|control_chokepoint>\"\
    ,\n      \"blocks_which_edits\": [\"<which specific edits are blocked>\"],\n \
    \     \"requires_change\": <true|false>,\n      \"change_complexity\": \"<trivial|moderate|significant>\"\
    ,\n      \"evidence\": \"<quote specific lines from BOTH affected and blocker\
    \ code>\"\n    }}\n  ],\n  \"rejected_predictions\": [\n    {{\n      \"symbol_name\"\
    : \"<symbol that is NOT blocking>\",\n      \"rejection_reason\": \"<why it's\
    \ not actually blocking, with code evidence>\"\n    }}\n  ],\n  \"validation_summary\"\
    : \"<2-3 sentence summary explaining which blockers are real and why>\"\n}}\n\n\
    Be strict - only confirm symbols with CONCRETE, VISIBLE blocking in the code.\n\
    Compare implementations line-by-line if needed.\n"
chat_mode_prompts:
  answer_with_files_and_symbols: 'You are a senior software engineer answering a user
    question using repository context.


    USER REQUEST (RAW):

    {user_prompt}


    AUGMENTED REQUEST (WITH MEMORY + HISTORY):

    {augmented_prompt}


    TASK CONTEXT:

    - Task type: {task_type}

    - Keywords: {keywords}


    FILES SELECTED FOR READING ({num_files}):

    {selected_files}


    FULL FILE CONTENTS:

    {files_content}


    RELATED SYMBOL CHUNKS ({num_symbols}):

    {symbols_with_code}


    REQUIREMENTS:

    1) Answer the user''s request directly and clearly.

    2) Reference concrete behavior from the provided files/symbol chunks.

    3) If uncertain, state assumptions explicitly.

    4) Do NOT propose edits unless the user asked for edits in /chat mode.

    5) Return plain text only, no JSON.

    '
  select_files_from_skeleton_batches: "You are selecting files to READ (not edit)\
    \ so you can answer a developer's question.\n\nUSER REQUEST (AUGMENTED WITH MEMORY\
    \ + HISTORY):\n{user_prompt}\n\nTASK CONTEXT:\n- Task type: {task_type}\n- Keywords:\
    \ {keywords}\n\nFILE SKELETONS ({num_files} files in this batch):\n{file_skeletons}\n\
    \nReturn ONLY file paths that should be read in full to answer the request accurately.\n\
    Be inclusive if unsure.\n\nRESPOND WITH JSON:\n{{\n  \"relevant_files\": [\"<relative/path/file1>\"\
    , \"<relative/path/file2>\"],\n  \"batch_summary\": \"<short reason for selection>\"\
    \n}}\n"
  skeleton_batch_size: 150
code_generation_prompts:
  generate_blocker_edit: "You are a code editor. Generate EXACT code edits for a blocking\
    \ symbol.\n\n**BLOCKING SYMBOL:** {blocker_name}\n**FILE:** {blocker_file}\n**WHY\
    \ IT'S BLOCKING:** {blocking_reason}\n**RESOLUTION STRATEGY:** {resolution_strategy}\n\
    **REQUIRED CHANGES:**\n{resolution_changes}\n\n**CURRENT CODE (with line numbers):**\n\
    ```\n{current_code_with_lines}\n```\n\n**IMPLEMENTATION PLAN:**\n{implementation_plan_summary}\n\
    \n**PREVIOUS EDITS IN THIS SESSION:**\n{previous_edits}\n\n**YOUR TASK:**\nGenerate\
    \ EXACT code edits using SEARCH/REPLACE blocks.\n\n**RULES:**\n1. Use SEARCH blocks\
    \ with EXACT code (must match exactly)\n2. REPLACE blocks contain the new code\n\
    3. Include enough context in SEARCH to be unique (3-5 lines minimum)\n4. Handle\
    \ imports separately in imports_to_add/imports_to_remove\n5. Make MINIMAL changes\
    \ - only what's needed to unblock\n\n**RESPOND WITH JSON:**\n{{\n  \"edits\":\
    \ [\n    {{\n      \"search\": \"<<<EXACT code to find, with proper indentation>>>\"\
    ,\n      \"replace\": \"<<<NEW code, with proper indentation>>>\",\n      \"reason\"\
    : \"<why this change unblocks>\"\n    }}\n  ],\n  \"imports_to_add\": [\"<import\
    \ statements to add at top of file>\"],\n  \"imports_to_remove\": [\"<import statements\
    \ to remove>\"],\n  \"summary\": \"<1-2 sentence summary of changes made>\"\n\
    }}\n\nCRITICAL: SEARCH blocks must match EXACTLY (character-for-character).\n"
  generate_new_file: 'You are a code writer. Generate a complete NEW FILE with all
    its contents.


    **FILE NAME:** {file_name}

    **TARGET DIRECTORY:** {target_directory}

    **PURPOSE:** {file_purpose}

    **STRUCTURE:** {file_structure}


    **SYMBOLS TO CREATE IN THIS FILE:**

    {symbols_to_create}


    **SIMILAR FILES FOR REFERENCE:**

    {similar_files_context}


    **PREVIOUS EDITS:**

    {previous_edits}


    **CRITICAL OUTPUT RULES (MUST FOLLOW):**

    1. Output CODE ONLY. Do NOT output JSON.

    2. Do NOT output metadata objects, keys, arrays, or explanations.

    3. Do NOT output markdown fences.

    4. First line must be valid source code for the target file.

    5. If unsure, still return best-effort code only.

    6. Wrap the final answer exactly between CODE_START and CODE_END markers.


    **RESPONSE FORMAT (EXACT):**

    CODE_START

    <entire file code here>

    CODE_END


    Return nothing before CODE_START and nothing after CODE_END.

    '
  generate_new_symbol: "You are a code writer. Generate code for a NEW symbol to be\
    \ inserted into an existing file.\n\n**NEW SYMBOL:** {symbol_name}\n**TYPE:**\
    \ {symbol_type}\n**SIGNATURE:** {signature}\n**PURPOSE:** {purpose}\n**IMPLEMENTATION\
    \ LOGIC:** {implementation_logic}\n\n**TARGET FILE:** {target_file}\n**INSERTION\
    \ POINT:** Line {insertion_line}\n**CONTEXT:** {insertion_context}\n\n**CODE CONTEXT\
    \ AROUND INSERTION POINT:**\n```\n{context_code}\n```\n\n**PREVIOUS EDITS:**\n\
    {previous_edits}\n\n**YOUR TASK:**\n1. Provide metadata in JSON.\n2. Provide the\
    \ working code in a Python markdown block.\n\n**METADATA JSON:**\n{{\n  \"symbol_name\"\
    : \"{symbol_name}\",\n  \"imports_to_add\": [\"<any imports needed>\"],\n  \"\
    docstring\": \"<<<Docstring summary>>>\"\n}}\n\n**SYMBOL CODE:**\n```python\n\
    # Write the code for the symbol here... (ensure proper indentation)\n```\n"
  generate_symbol_edit: "You are a code editor. Generate EXACT code edits for an existing\
    \ symbol.\n\n**SYMBOL:** {symbol_name}\n**FILE:** {file_path}\n**EDIT TYPE:**\
    \ {edit_type}\n**PLANNED CHANGES:**\n{planned_changes}\n\n**CURRENT CODE (with\
    \ line numbers):**\n```\n{current_code_with_lines}\n```\n\n**IMPLEMENTATION CONTEXT:**\n\
    {implementation_plan_summary}\n\n**PREVIOUS EDITS:**\n{previous_edits}\n\n**YOUR\
    \ TASK:**\nGenerate EXACT code edits using SEARCH/REPLACE blocks.\n\n**RESPOND\
    \ WITH JSON:**\n{{\n  \"edits\": [\n    {{\n      \"search\": \"<<<EXACT code\
    \ to find>>>\",\n      \"replace\": \"<<<NEW code>>>\",\n      \"reason\": \"\
    <why this change>\"\n    }}\n  ],\n  \"imports_to_add\": [],\n  \"imports_to_remove\"\
    : [],\n  \"summary\": \"<summary>\"\n}}\n"
deep_scan_prompts:
  full_code_batch_scan: "You are a senior code reviewer and bug analysis expert. Your\
    \ task is to carefully read the FULL SOURCE CODE of these files and identify which\
    \ symbols are affected by the user's request.\n\n**USER REQUEST:**\n\"{user_prompt}\"\
    \n\n**TASK CONTEXT:**\n- Task Type: {task_type}\n- Keywords: {keywords}\n- This\
    \ is an OPEN-ENDED request \u2014 the user wants a thorough analysis without specifying\
    \ exact files or symbols.\n\n**FULL FILE CONTENTS ({num_files} files in this batch):**\n\
    {file_contents}\n\n**YOUR TASK:**\nRead each file carefully line by line. Based\
    \ on the user's request, identify:\n1. Symbols that contain issues, bugs, or areas\
    \ the user is asking about\n2. Symbols that would need to change to fulfill the\
    \ request\n3. Symbols that are functionally related to the user's intent\n\nFor\
    \ each affected symbol, explain specifically WHAT about it is relevant and WHERE\
    \ in the code the issue or relevance exists.\n\n**RESPOND WITH JSON:**\n{{\n \
    \ \"affected_symbols\": [\n    {{\n      \"symbol_name\": \"<exact function/class\
    \ name>\",\n      \"file_path\": \"<relative file path>\",\n      \"reason\":\
    \ \"<detailed explanation of WHY this symbol is affected, referencing specific\
    \ code>\",\n      \"change_type\": \"<modify|reference|investigate>\",\n     \
    \ \"priority\": \"<high|medium|low>\"\n    }}\n  ],\n  \"batch_summary\": \"<1-2\
    \ sentence summary of findings>\"\n}}\n\nBe THOROUGH \u2014 read every function\
    \ and class. The user is relying on you to find things they might have missed.\n\
    If no symbols are affected, return an empty array.\n"
  skeleton_batch_scan: "You are a codebase analysis expert. Your task is to identify\
    \ which symbols from these file skeletons are affected by the user's request.\n\
    \n**USER REQUEST:**\n\"{user_prompt}\"\n\n**TASK CONTEXT:**\n- Task Type: {task_type}\n\
    - Keywords: {keywords}\n\n**FILE SKELETONS ({num_files} files in this batch):**\n\
    Below are the structural skeletons of source files showing imports, class definitions,\
    \ and function signatures with their line numbers.\n\n{file_skeletons}\n\n**YOUR\
    \ TASK:**\nAnalyze each file skeleton and identify symbols that would need to\
    \ be MODIFIED, READ, or REFERENCED to fulfill the user's request.\n\nConsider:\n\
    - Function signatures and their parameters\n- Class hierarchies and method names\n\
    - Import dependencies between files\n- Whether the symbol's PURPOSE (inferred\
    \ from name and signature) relates to the user's request\n\n**RESPOND WITH JSON:**\n\
    {{\n  \"affected_symbols\": [\n    {{\n      \"symbol_name\": \"<exact symbol\
    \ name from skeleton>\",\n      \"file_path\": \"<relative file path>\",\n   \
    \   \"reason\": \"<why this symbol is affected by the user request>\",\n     \
    \ \"change_type\": \"<modify|reference|create_new>\",\n      \"priority\": \"\
    <high|medium|low>\"\n    }}\n  ],\n  \"batch_summary\": \"<1-2 sentence summary\
    \ of findings in this batch>\"\n}}\n\nBe SELECTIVE \u2014 only include symbols\
    \ with CLEAR relevance to the user request.\nIf no symbols in this batch are affected,\
    \ return an empty affected_symbols array.\n"
  verify_deep_candidates: "You are a final verification expert. You have been given\
    \ candidate symbols that were identified as potentially affected by the user's\
    \ request. Your job is to CONFIRM which ones are truly affected by reading their\
    \ FULL CODE.\n\n**USER REQUEST:**\n\"{user_prompt}\"\n\n**TASK CONTEXT:**\n- Task\
    \ Type: {task_type}\n- Keywords: {keywords}\n\n**CANDIDATE SYMBOLS WITH FULL CODE\
    \ ({num_symbols} symbols):**\n{symbols_with_code}\n\n**YOUR TASK:**\nFor each\
    \ candidate symbol:\n1. Read the full code carefully\n2. Determine if it is TRULY\
    \ affected by the user's request\n3. If affected, explain exactly HOW it needs\
    \ to change or why it's relevant\n4. If NOT affected, exclude it from your response\n\
    \n**RESPOND WITH JSON:**\n{{\n  \"verified_symbols\": [\n    {{\n      \"symbol_name\"\
    : \"<exact name>\",\n      \"file_path\": \"<exact path>\",\n      \"chunk_id\"\
    : \"<chunk_id from input>\",\n      \"reason\": \"<detailed explanation of HOW\
    \ this symbol is affected>\",\n      \"change_type\": \"<modify|reference|investigate>\"\
    ,\n      \"priority\": \"<high|medium|low>\"\n    }}\n  ],\n  \"verification_summary\"\
    : \"<2-3 sentence summary of what was confirmed and what was rejected>\"\n}}\n\
    \nBe STRICT \u2014 only confirm symbols with concrete, visible relevance in their\
    \ code.\nCompare the user's intent against the actual implementation.\n"
