    \ specific symbol names (functions/classes/variables)\n   - Examples: \"modify\
    \ function getUserById\", \"rename class UserModel\", \"update the handleLogin\
    \ method\"\n\n3. **Explicit File Edits**: User mentions specific files or paths\n\
    \   - Examples: \"edit auth.js\", \"update components/Navbar.jsx\", \"fix the\
    \ config file\"\n\n4. **New Creations**: User explicitly asks to create new files/symbols\n\
    \   - Examples: \"create new component LoginButton\", \"add a new file utils.py\"\
    , \"make a new function calculateTotal\"\n\n5. **Implicit Behavior**: No explicit\
    \ mentions, just behavioral requests\n   - Examples: \"improve performance\",\
    \ \"add authentication\", \"make the UI responsive\"\n\nBe VERY thorough. If user\
    \ says \"in the navbar\", extract \"navbar\" as a file/symbol pattern.\nIf user\
    \ says \"around line 50\", extract line 50.\nIf user says \"the login function\"\
    , extract \"login\" as symbol name.\n\nRespond with JSON:\n{{\n  \"explicit_line_edits\"\
    : [\n    {{\n      \"file\": \"<exact file name if mentioned, else null>\",\n\
    \      \"line\": <line number or null>,\n      \"line_range\": {{\"start\": <num>,\
    \ \"end\": <num>}} or null,\n      \"action\": \"<change|add|remove|null>\",\n\
    \      \"details\": \"<what to do>\"\n    }}\n  ],\n  \"explicit_symbol_edits\"\
    : [\n    {{\n      \"symbol_name\": \"<exact or partial symbol name>\",\n    \
