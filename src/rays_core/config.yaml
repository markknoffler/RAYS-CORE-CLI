    \nKeywords Extracted: {keywords}\n\nAvailable Symbol Types in Codebase: {available_symbol_types}\n\
    \nFor EACH keyword, determine which symbol types it could refer to based on user\
    \ intent.\nConsider the context and what the user is trying to accomplish.\n\n\
    Examples:\n- \"button\" \u2192 [\"component\", \"class\", \"function\"]\n- \"\
    login\" \u2192 [\"function\", \"method\", \"class\", \"controller\"]\n- \"database\"\
    \ \u2192 [\"class\", \"constant\", \"function\", \"model\"]\n- \"API\" \u2192\
    \ [\"router\", \"controller\", \"function\"]\n\nIMPORTANT: Only use symbol types\
    \ that exist in the available list.\nIf uncertain, include multiple plausible\
    \ types.\n\nRespond with JSON:\n{{\n  \"keyword_to_types\": {{\n    \"keyword1\"\
    : [\"type1\", \"type2\"],\n    \"keyword2\": [\"type3\"],\n    ...\n  }},\n  \"\
    reasoning\": \"brief explanation of mappings\"\n}}\n"
  sparse_fill_skeleton_batch: "Early symbol retrieval returned very few indexed candidates.\
    \ Using ONLY the file skeletons below\n(imports, class/function signatures, return\
    \ annotations, docstrings, and signature-line comments),\nlist a BROAD set of\
    \ symbols that might need to be read or modified for this task.\n\n**FULL TASK\
    \ CONTEXT (user prompt plus memory and recent history):**\n{user_prompt}\n\n**TASK\
    \ METADATA:**\n- Task type: {task_type}\n- Keywords: {keywords}\n\n**FILE SKELETONS\
    \ ({num_files} files in this batch):**\n{file_skeletons}\n\n**RESPOND WITH JSON:**\n\
    {{\n  \"affected_symbols\": [\n    {{\n      \"symbol_name\": \"<exact name from\
    \ skeleton>\",\n      \"file_path\": \"<relative path>\",\n      \"reason\": \"\
    <why this symbol might matter>\",\n      \"change_type\": \"<modify|reference|create_new>\"\
    ,\n      \"priority\": \"<high|medium|low>\"\n    }}\n  ],\n  \"batch_summary\"\
    : \"<optional short note>\"\n}}\n\nInclude every plausibly relevant symbol in\
    \ this batch. A later pipeline step will narrow the list.\nUse exact names and\
    \ paths as they appear in the skeletons. If none apply, return an empty affected_symbols\
    \ array.\n"
task_analysis_prompts:
  keyword_extraction: "Extract all relevant technical keywords, symbol names, and\
    \ file patterns from this prompt.\n\nUser Prompt: \"{user_prompt}\"\n\nExtract:\n\
    1. Keywords: Technical terms, concepts, technologies (e.g., \"authentication\"\
    , \"database\", \"API\")\n2. Symbol Names: Specific function/class/variable names\
    \ mentioned (e.g., \"handleLogin\", \"UserModel\")\n3. File Patterns: File names\
    \ or patterns (e.g., \"auth.py\", \"*.config.js\", \"components/\")\n\nRespond\
    \ with JSON:\n{{\n  \"keywords\": [\"keyword1\", \"keyword2\", ...],\n  \"symbol_names\"\
    : [\"symbol1\", \"symbol2\", ...],\n  \"file_patterns\": [\"pattern1\", \"pattern2\"\
    , ...]\n}}\n"
  sds_ies_calculation: "Analyze this user prompt and calculate two scores:\n\nUser\
    \ Prompt: \"{user_prompt}\"\n\n1. SDS (Scope Definition Score): How well-defined\
    \ is the scope?\n   - 0.0 = Extremely vague (e.g., \"make it better\")\n   - 0.5\
    \ = Moderate clarity (e.g., \"add a button\")\n   - 1.0 = Highly specific (e.g.,\
    \ \"add a red logout button with icon at top-right of navbar\")\n\n2. IES (Intent\
    \ Expression Score): How much creative freedom does the user grant?\n   - 0.0\
    \ = Strict, explicit instructions (e.g., \"change line 45 to return false\")\n\
    \   - 0.5 = Some flexibility (e.g., \"improve error handling\")\n   - 1.0 = High\
    \ creative freedom (e.g., \"make the UI look better\")\n\nRespond with JSON:\n\
    {{\n  \"sds_score\": <float 0.0-1.0>,\n  \"ies_score\": <float 0.0-1.0>,\n  \"\
    reasoning\": \"<brief explanation>\"\n}}\n"
  symbol_type_detection: "Based on the user prompt and extracted keywords, determine\
    \ which symbol types are relevant.\n\nUser Prompt: \"{user_prompt}\"\nKeywords:\
    \ {keywords}\n\nAvailable Symbol Types:\n- function: Regular functions\n- class:\
    \ Classes\n- component: UI components (React, Vue, etc.)\n- hook: React hooks\
    \ or similar\n- model: Database models, schemas\n- schema: Data validation schemas\n\
    - router: Route handlers\n- controller: API controllers\n- utility: Helper/utility\
    \ functions\n- constant: Constants, enums\n\nMapping hints:\n- \"button\", \"\
    modal\", \"form\" \u2192 component\n- \"login\", \"auth\" \u2192 controller, router,\
    \ model\n- \"database\", \"DB\" \u2192 model, schema\n- \"API\", \"endpoint\"\
    \ \u2192 router, controller\n- \"helper\", \"utils\" \u2192 utility\n- \"config\"\
    \ \u2192 constant\n\nRespond with JSON:\n{{\n  \"symbol_types\": [\"type1\", \"\
    type2\", ...],\n  \"reasoning\": \"<brief explanation>\"\n}}\n"
  system_instructions: 'You are an expert code analysis AI. Your job is to analyze
    user requests and extract structured information.

    Always respond with valid JSON only. No explanations, no markdown, just raw JSON.

    Be precise and thorough in your analysis.

    '
  task_classification: "Analyze this user prompt and determine if the user is explicitly\
    \ or implicitly requesting the creation of an entirely new codebase, project,\
    \ or pipeline from scratch.\n\nUser Prompt: \"{user_prompt}\"\n\nDetermine which\
    \ category this falls into:\n- \"edit_code\": User wants to modify or extend existing\
    \ code in the current codebase.\n- \"chat_with_code\": User wants to ask questions,\
    \ explain code, or discuss designs (no actual code generation/modification).\n\
    - \"new_codebase\": User wants to generate an entirely new project, repository,\
    \ or codebase from scratch (e.g., \"Create a new Flask app\", \"Initialize a React\
    \ project\").\n\nRespond with JSON:\n{{\n  \"task_type\": \"new_codebase\" if\
    \ it's a new project, else \"edit_code\" or \"chat_with_code\",\n  \"reasoning\"\
    : \"brief explanation\"\n}}\n"
  tool_requirements: "Analyze this user prompt and determine what tools are needed.\n\
    \nUser Prompt: \"{user_prompt}\"\n\nDetermine TWO things:\n\n1. EDIT CODEBASE\
    \ - Does the user want to modify/add/remove code?\n  Examples:\n  - \"Add a login\
    \ button\" \u2192 YES (editing code)\n  - \"Fix the authentication bug\" \u2192\
    \ YES (editing code)\n  - \"Refactor the API module\" \u2192 YES (editing code)\n\
    \  - \"What does this function do?\" \u2192 NO (just asking question)\n  - \"\
    How does authentication work?\" \u2192 NO (just asking question)\n\n2. TERMINAL\
    \ TOOL - Does the user need to execute shell/terminal commands?\n  Examples:\n\
    \  - \"Commit these changes to git\" \u2192 YES (terminal needed)\n  - \"Install\
    \ the dependencies\" \u2192 YES (npm/pip install)\n  - \"Create a new directory\
    \ called utils\" \u2192 YES (mkdir)\n  - \"Run the tests\" \u2192 YES (npm test,\
    \ pytest, etc.)\n  - \"Deploy to production\" \u2192 YES (deployment commands)\n\
    \  - \"Add a function called getUserById\" \u2192 NO (just editing code)\n\nBOTH\
    \ can be true:\n- \"Add a login feature and commit it to git\" \u2192 edit_codebase:\
    \ true, terminal_tool: true\n- \"Install express and create an API route\" \u2192\
    \ edit_codebase: true, terminal_tool: true\n\nRespond with JSON:\n{{\n  \"edit_codebase\"\
    : <true|false>,\n  \"terminal_tool\": <true|false>,\n  \"reasoning\": \"<brief\
    \ explanation>\"\n}}\n"
terminal_execution_prompts:
  classify_failure: "A terminal intent has failed. Determine if it is an environment\
    \ issue or a bug in the code.\n\n**CODEBASE ROOT (ABSOLUTE PATH):**\n\"{codebase_root}\"\
    \n\n**INTENT:**\n{intent_json}\n\n**USER PROMPT:**\n\"{user_prompt}\"\n\n**STACK\
    \ TRACE / OUTPUT:**\n{failure_output}\n\n**TASK:**\nClassify the failure into\
    \ one of:\n- \"environment_issue\": Missing dependencies, permission errors, network\
    \ issues, or INCORRECT PATHS (e.g. hallucinating /workspace/project).\n- \"code_bug\"\
    : Runtime errors, logic errors, syntax errors in the codebase.\n\n**JSON STRUCTURE:**\n\
    {{\n  \"failure_type\": \"<environment_issue|code_bug>\",\n  \"reason\": \"<detailed\
    \ explanation of the failure>\",\n  \"primary_point_of_failure\": \"<exact file/line/command\
    \ that failed>\"\n}}\n"
  decide_after_intent: "Based on the combined results of all commands executed for\
    \ this intent, decide what to do next.\n\n**CODEBASE ROOT (ABSOLUTE PATH):**\n\
    \"{codebase_root}\"\n\n**USER PROMPT:**\n\"{user_prompt}\"\n\n**INTENT:**\n{intent_json}\n\
    \n**COMBINED OUTPUT OF ALL COMMANDS (last 50 lines per command):**\n{combined_output}\n\
    \n**TASK:**\nDecide the next action. \nOptions:\n- \"exit\": The intent is successfully\
    \ satisfied.\n- \"failure_retry\": The output indicates a code bug (e.g., traceback)\
    \ that needs a fix.\n- \"new_intent\": The output indicates an environmental issue\
    \ or a need for a different setup or a new major task.\n\n**JSON STRUCTURE:**\n\
    {{\n  \"decision\": \"<exit|failure_retry|new_intent>\",\n  \"reasoning\": \"\
    <why this decision was made>\"\n}}\n"
  decide_at_milestone: "You have executed 5 commands for this intent and it is not\
    \ yet complete. \nDecide whether to continue for another 5 commands or handle\
    \ a failure.\n\n**CODEBASE ROOT (ABSOLUTE PATH):**\n\"{codebase_root}\"\n\n**USER\
    \ PROMPT:**\n\"{user_prompt}\"\n\n**INTENT:**\n{intent_json}\n\n**COMMAND HISTORY\
    \ (last 50 lines of each previous command):**\n{command_history}\n\n**TASK:**\n\
    Decide the next action for this milestone.\nOptions:\n- \"continue\": The approach\
    \ is correct but needs more steps.\n- \"failure_retry\": The approach has hit\
    \ a code bug.\n- \"new_intent\": The approach is failing due to environmental\
    \ issues or incorrect paths.\n\n**JSON STRUCTURE:**\n{{\n  \"decision\": \"<continue|failure_retry|new_intent>\"\
    ,\n  \"reasoning\": \"<why this decision was made>\"\n}}\n"
  generate_commands: "You are a command generator. Generate a list of shell commands\
    \ to fulfill the current intent.\n\n**CODEBASE ROOT:**\n\"{codebase_root}\"\n\n\
    **USER PROMPT:**\n\"{user_prompt}\"\n\n**CURRENT INTENT:**\n{intent_json}\n\n\
    **COMMAND HISTORY (from previous attempts/intents):**\n{command_history}\n\n**STRICT\
    \ RULES:**\n1. **Batching**: Return ALL commands needed to satisfy the intent\
    \ at once. \n2. **Sequential Logic**: Ensure commands are in the correct execution\
    \ order.\n3. **Stay in Root**: Use the codebase root provided above.\n\n**TASK:**\n\
    Generate the list of commands to be executed. \nIf the intent requires no commands,\
    \ return an empty list of commands or \"exit\".\n\n**JSON STRUCTURE:**\n{{\n \
    \ \"commands\": [\"<shell command 1>\", \"<shell command 2>\", ...],\n  \"cwd\"\
    : \"<working directory>\",\n  \"reasoning\": \"<why these commands fulfill the\
    \ user's specific request>\"\n}}\n"
  generate_intents: "You are a terminal execution planner. Your job is to determine\
    \ IF any shell commands are strictly required BEFORE or AFTER a code edit.\n\n\
    **CODEBASE ROOT (ABSOLUTE PATH):**\n\"{codebase_root}\"\n\n**USER PROMPT:**\n\"\
    {user_prompt}\"\n\n**EDITING FLAG:** {editing_flag}\n\n**IMPLEMENTATION PLAN SUMMARY\
    \ (if editing):**\n{plan_summary}\n\n**CRITICAL STRICTURES:**\n1. **Minimalism**:\
    \ DO NOT propose any intent that the user did not explicitly ask for.\n2. **Intent\
    \ Consolidation**: Only create NEW intents when a major setup or fundamentally\
    \ different activity is required. \n   - Installing a package (npm/pip install)\
    \ DOES NOT qualify for a separate intent; it should be integrated into the intent\
    \ that needs that package.\n   - Small prep steps like `ls` or `mkdir` should\
    \ be part of the primary intent.\n3. **No Setup Busywork**: DO NOT initialize\
    \ git, or create READMEs unless the user specifically typed \"create a directory\"\
    \ or \"init git\".\n4. **Role Separation**: If the user wants to create a new\
    \ file, the code editor will do it. DO NOT use `mkdir` or `touch` in the terminal\
    \ to \"prepare\" for an edit.\n\n**TASK:**\nGenerate a list of intents required\
    \ to fulfill the user request. \nIf no terminal actions are strictly required,\
    \ return an empty list.\n\n**JSON STRUCTURE:**\n{{\n  \"intents\": [\n    {{\n\
    \      \"exec_id\": \"unique_id_01\",\n      \"phase\": \"<PRE_EDIT|POST_EDIT|NONE>\"\
    ,\n      \"intent\": \"<minimal description of explicitly requested action>\"\
    ,\n      \"constraints\": {{\n        \"package_manager\": \"<npm|pip|etc|null>\"\
    ,\n        \"cwd\": \"<working directory>\"\n      }},\n      \"retryable\": <true|false>\n\
    \    }}\n  ]\n}}\n"
  resolve_code_bug: "You are a principal software engineer and debugging expert. Analyze\
    \ the failure and the extensive context provided to propose a complete resolution\
    \ plan.\n\n**CODEBASE ROOT (ABSOLUTE PATH):**\n\"{codebase_root}\"\n\n**DEBUGGING\
    \ CONTEXT:**\n- Root Directory Tree:\n{directory_tree}\n\n- Stack Traceback (Focused):\n\
    {stack_trace}\n\n- Affected Symbols (+/- 50 lines context):\n{affected_symbols_context}\n\
    \n- Related Symbols (from dependency graph):\n{related_symbols_context}\n\n- Previous\
    \ Edits/Context Ledger:\n{edit_ledger}\n\n**USER PROMPT:**\n\"{user_prompt}\"\n\
    \n**CURRENT INTENT:**\n{intent_json}\n\n**TASK:**\nAnalyze the bug and propose\
    \ a resolution. Unlike the initial simple retry, you are now empowered to:\n1.\
    \ Edit existing symbols.\n2. Create NEW symbols in existing files.\n3. Create\
    \ NEW files with symbols.\n\nYour output MUST be a sophisticated implementation\
    \ plan following the EXACT structure of the main RAYS pipeline implementation\
    \ plan.\n\n**JSON STRUCTURE:**\n{{\n  \"plan_summary\": \"<detailed high-level\
    \ overview of the fix>\",\n  \"new_files\": [\n    {{\n      \"name\": \"<filename>\"\
    ,\n      \"purpose\": \"<why this file is needed>\",\n      \"symbols_to_create\"\
    : [\n        {{ \"name\": \"<name>\", \"type\": \"<type>\", \"purpose\": \"<purpose>\"\
    \ }}\n      ]\n    }}\n  ],\n  \"new_symbols\": [\n    {{\n      \"name\": \"\
    <name>\",\n      \"type\": \"<type>\",\n      \"file\": \"<file_path>\",\n   \
    \   \"purpose\": \"<purpose>\"\n    }}\n  ],\n  \"existing_symbol_edits\": [\n\
    \    {{\n      \"symbol_name\": \"<name>\",\n      \"file_path\": \"<path>\",\n\
    \      \"edit_type\": \"logical_change\",\n      \"changes\": [\n        {{ \"\
    location\": \"<location>\", \"reason\": \"<reason>\" }}\n      ]\n    }}\n  ],\n\
    \  \"total_counts\": {{\n    \"new_files\": <int>,\n    \"new_symbols\": <int>,\n\
    \    \"edited_symbols\": <int>,\n    \"edited_files\": <int>,\n    \"estimated_total_lines_changed\"\
    : <int>\n  }}\n}}\n"
  resolve_code_bug_permissions: "Based on the debugging analysis and the user's root\
    \ request, determine what permissions are needed to apply this fix.\n\n**USER\
    \ PROMPT:**\n\"{user_prompt}\"\n\n**FIX PLAN:**\n{fix_plan_json}\n\n**TASK:**\n\
    Generate a permission request envelope.\n\n**JSON STRUCTURE:**\n{{\n  \"files_to_edit\"\
    : <int>,\n  \"files_to_edit_names\": [\"<path>\"],\n  \"files_to_create\": <int>,\n\
    \  \"files_to_create_details\": [\n    {{ \"name\": \"<path>\", \"purpose\": \"\
    <purpose>\" }}\n  ],\n  \"symbols_to_create\": <int>,\n  \"symbols_to_create_details\"\
    : [\n    {{ \"name\": \"<name>\", \"type\": \"<type>\", \"purpose\": \"<purpose>\"\
    \ }}\n  ],\n  \"additional_lines\": <int>\n}}\n"
  resolve_env_issue: "Create a new intent to resolve an environment issue.\n\n**CODEBASE\
    \ ROOT (ABSOLUTE PATH):**\n\"{codebase_root}\"\n\n**USER PROMPT:**\n\"{user_prompt}\"\
    \n\n**PREVIOUS INTENT:**\n{previous_intent}\n\n**FAILURE POINT:**\n{failure_point}\n\
    \n**PREVIOUS COMMAND HISTORY:**\n{command_history}\n\n**STRICT RULES:**\n1. Create\
    \ a single new intent that solves the point of failure AND completes the original\
    \ task.\n2. DO NOT propose actions that require a web browser (e.g., \"Create\
    \ a repo on GitHub.com\"). If such an action is required, RETURN \"exit\" and\
    \ inform the user they must perform the setup manually.\n3. Use the ABSOLUTE CODEBASE\
    \ ROOT: \"{codebase_root}\"\n4. Review the PREVIOUS COMMAND HISTORY to avoid repeating\
    \ failing commands.\n\n**JSON STRUCTURE:**\n{{\n  \"exec_id\": \"resolve_fail_01\"\
    ,\n  \"phase\": \"<same as previous>\",\n  \"intent\": \"this is why this failed\
    \ so lets do this first and then do this which was the previous intent\",\n  \"\
    constraints\": {{ ... }},\n  \"retryable\": true\n}}\n"
