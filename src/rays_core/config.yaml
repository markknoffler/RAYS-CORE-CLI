    \ Structure: {directory_tree}\n\n**Requirements for the Plan:**\n1. **Responsibility\
    \ Decomposition:** Group capabilities into cohesive responsibilities. Each responsibility\
    \ becomes at most ONE file.\n2. **Dependency Ordering (DAG):** Order files based\
    \ on creation order (dependencies first). \n   - Entry points usually come last\
