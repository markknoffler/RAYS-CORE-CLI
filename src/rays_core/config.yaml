      "plan": [
        {{
          "step": 1,
          "skill": "workspace",
          "reason": "Map the directory and read existing markdown content."
        }},
        {{
          "step": 2,
          "skill": "docx",
          "reason": "Generate the docx file in the mapped directory using the gathered content."
