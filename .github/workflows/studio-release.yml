# RAYS Studio — production installers published to GitHub Releases.
#
# Trigger: push tag studio-vX.Y.Z (e.g. studio-v1.0.1) or manual "Run workflow".
# Separate from the CLI/PyPI release workflow (pypi-release.yml), which uses vX.Y.Z tags.
name: RAYS Studio Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (must match studio-vX.Y.Z)"
        required: true
        default: "studio-v1.0.0"
  push:
    tags:
      - "studio-v*"

permissions:
  contents: write

concurrency:
  group: studio-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.out.outputs.tag }}
      version: ${{ steps.out.outputs.version }}
    steps:
      - id: out
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^studio-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like studio-v1.0.0 (got: $TAG)" >&2
            exit 1
          fi
          VER="${TAG#studio-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

  studio-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps (studio)
        run: python -m pip install -e ".[studio,dev]"

      - name: Run GUI bridge tests (pytest)
        run: python -m pytest tests/test_studio_bridge.py -q

      - name: Run GUI UI tests (vitest)
        working-directory: Electron_app/RAYS-Studio/ui
        run: |
          npm ci
          npm test

  build:
    needs: [resolve-version, studio-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos
            runs-on: macos-latest
            build_script: ./build-dmg.sh
            verify_platform: mac
          - id: ubuntu
            runs-on: ubuntu-latest
            build_script: ./build-linux.sh
            verify_platform: linux
            apt: true
          - id: windows
            runs-on: windows-latest
            build_script: powershell -ExecutionPolicy Bypass -File ./build-windows.ps1
            verify_platform: win
          - id: arch
            runs-on: ubuntu-latest
            build_script: ./build-arch.sh
            verify_platform: linux
            container: archlinux:latest
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container || null }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch build deps
        if: matrix.id == 'arch'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git nodejs npm python python-pip fuse2 \
            gtk3 libxss alsa-lib nss

      - name: Sync package.json version
        working-directory: Electron_app/RAYS-Studio/desktop
        shell: bash
        run: |
          node -e "
            const fs=require('fs');
            const p='package.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            j.version='${{ needs.resolve-version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
          "

      - uses: actions/setup-node@v4
        if: matrix.id != 'arch'
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        if: matrix.id != 'arch'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ubuntu build deps
        if: matrix.apt == true
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            libfuse2 rpm libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libuuid1

      - name: Build (${{ matrix.id }})
        working-directory: Electron_app/RAYS-Studio
        shell: bash
        env:
          RAYS_VERIFY_PLATFORM: ${{ matrix.verify_platform }}
        run: |
          chmod +x build-dmg.sh build-linux.sh build-arch.sh desktop/scripts/bundle-backend.sh 2>/dev/null || true
          ${{ matrix.build_script }}

      - name: Collect release artifacts
        shell: bash
        run: |
          RELEASE="Electron_app/RAYS-Studio/desktop/release"
          mkdir -p "studio-artifacts/${{ matrix.id }}"
          if [[ ! -d "$RELEASE" ]]; then
            echo "Missing release directory: $RELEASE" >&2
            exit 1
          fi
          find "$RELEASE" -maxdepth 2 -type f \
            \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \
               -o -name '*.deb' -o -name '*.pkg.tar.zst' -o -name '*.zip' \) \
            -exec cp -v {} "studio-artifacts/${{ matrix.id }}/" \;
          echo "Artifacts for ${{ matrix.id }}:"
          ls -la "studio-artifacts/${{ matrix.id }}" || true
          test "$(find "studio-artifacts/${{ matrix.id }}" -type f | wc -l)" -gt 0

      - uses: actions/upload-artifact@v4
        with:
          name: studio-release-${{ matrix.id }}
          path: studio-artifacts/${{ matrix.id }}/*
          if-no-files-found: error

  publish:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: studio-release-*
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: RAYS Studio ${{ needs.resolve-version.outputs.version }}
          body: |
            ## RAYS Studio ${{ needs.resolve-version.outputs.version }}

            Desktop GUI for RAYS-CORE. Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | macOS | `.dmg` or `.zip` |
            | Windows | `.exe` (NSIS) or `.zip` |
            | Ubuntu / Debian | `.deb` or `.AppImage` |
            | Arch Linux | `.pkg.tar.zst` or `.AppImage` |

            See [docs/STUDIO_RELEASES.md](https://github.com/${{ github.repository }}/blob/main/docs/STUDIO_RELEASES.md) for install notes.

            **Requires:** Ollama (local) or a cloud API key configured inside the app.
          generate_release_notes: true
          files: release-assets/**
          draft: false
          prerelease: false
          make_latest: true
