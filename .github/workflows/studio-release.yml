# RAYS Studio — production installers published to GitHub Releases.
# Trigger: push tag studio-v* (e.g. studio-v1.0.1) or manual "Run workflow".
name: RAYS Studio Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (must match studio-vX.Y.Z)"
        required: true
        default: "studio-v1.0.0"
  push:
    tags:
      - "studio-v*"

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.out.outputs.tag }}
      version: ${{ steps.out.outputs.version }}
    steps:
      - id: out
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^studio-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like studio-v1.0.0 (got: $TAG)" >&2
            exit 1
          fi
          VER="${TAG#studio-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos
            runs-on: macos-latest
            script: ./build-dmg.sh
          - id: ubuntu
            runs-on: ubuntu-latest
            script: ./build-linux.sh
            apt: true
          - id: windows
            runs-on: windows-latest
            script: powershell -ExecutionPolicy Bypass -File ./build-windows.ps1
          - id: arch
            runs-on: ubuntu-latest
            script: ./build-arch.sh
            container: archlinux:latest
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container || null }}
    timeout-minutes: 90
    steps:
      - name: Install Arch base packages
        if: matrix.id == 'arch'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git nodejs npm python python-pip fuse2

      - uses: actions/checkout@v4

      - name: Sync package.json version
        working-directory: Electron_app/RAYS-Studio/desktop
        shell: bash
        run: |
          node -e "
            const fs=require('fs');
            const p='package.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            j.version='${{ needs.resolve-version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
          "

      - uses: actions/setup-node@v4
        if: matrix.id != 'arch'
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        if: matrix.id != 'arch'
        with:
          python-version: "3.12"

      - name: Install Ubuntu deps
        if: matrix.apt == true
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Build (${{ matrix.id }})
        working-directory: Electron_app/RAYS-Studio
        shell: bash
        run: |
          chmod +x build-dmg.sh build-linux.sh build-arch.sh desktop/scripts/bundle-backend.sh 2>/dev/null || true
          ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: studio-release-${{ matrix.id }}
          path: Electron_app/RAYS-Studio/desktop/release/*
          if-no-files-found: error

  publish:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: studio-release-*
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: RAYS Studio ${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
          files: release-assets/**
          draft: false
          prerelease: false
