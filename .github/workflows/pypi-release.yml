# CLI / PyPI release — separate from RAYS Studio (studio-v* tags → GitHub Releases).
#
# Trigger: push tag vX.Y.Z (e.g. v1.6.0). Does NOT run for studio-v* tags.
name: PyPI Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m pytest tests/ -q

      - name: Build wheel and sdist
        run: |
          python -m pip install build "twine>=6.1"
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist-${{ matrix.os }}
          path: dist/*
          retention-days: 7

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pypi-dist-ubuntu-latest
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install "twine>=6.1"
          twine upload dist/*
